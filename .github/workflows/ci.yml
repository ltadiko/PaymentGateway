name: CI - Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: ./mvnw compile -q --no-transfer-progress

      - name: Run unit tests
        run: ./mvnw test -pl . -Dtest="com.fintech.gateway.domain.**,com.fintech.gateway.application.**,com.fintech.gateway.infrastructure.crypto.**,com.fintech.gateway.infrastructure.security.JwtTokenProviderTest,com.fintech.gateway.infrastructure.security.TenantContextTest,com.fintech.gateway.infrastructure.logging.**,com.fintech.gateway.infrastructure.adapter.out.messaging.OutboxP*,com.fintech.gateway.infrastructure.adapter.out.bank.**" --no-transfer-progress

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests (unit + integration)
        run: ./mvnw verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Report
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

