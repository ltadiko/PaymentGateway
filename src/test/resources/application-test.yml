spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-gateway-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.fintech.gateway.*
      enable-auto-commit: false
    listener:
      ack-mode: record

app:
  security:
    jwt:
      secret: TestSecretKeyForHMACSHA256MustBeAtLeast256BitsLongForSecurity!!
      expiration-ms: 3600000
  encryption:
    secret-key: TestAES256SecKey!
  fraud:
    api:
      base-url: http://localhost:${local.server.port:8080}
  outbox:
    poll-interval-ms: 500
    cleanup-interval-ms: 3600000
    retention-days: 1

logging:
  level:
    com.fintech.gateway: DEBUG
    org.springframework.kafka: WARN
    org.apache.kafka: WARN

