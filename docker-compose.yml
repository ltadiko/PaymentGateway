# ─────────────────────────────────────────────────────────────────────────────
# Payment Gateway — Docker Compose
#
# Usage:
#   docker-compose up -d              # Start Kafka only (run app with Maven)
#   docker-compose --profile app up -d # Start Kafka + Spring Boot app
#   docker-compose down                # Stop everything
#
# The Spring Boot app can run either:
#   a) Inside Docker (--profile app) → http://localhost:8080
#   b) Outside Docker (./mvnw spring-boot:run) → http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Kafka (KRaft mode — no Zookeeper) ──
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: payment-gateway-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Payment Gateway Application (optional — activate with --profile app) ──
  payment-gateway:
    build: .
    container_name: payment-gateway-app
    profiles:
      - app
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_H2_CONSOLE_SETTINGS_WEB-ALLOW-OTHERS: "true"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/auth/token", "-X", "POST", "-H", "Content-Type: application/json", "-d", '{"subject":"health","tenantId":"system","roles":[]}']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

